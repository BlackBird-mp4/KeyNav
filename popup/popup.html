<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup" id="popup">
    <div class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="4" width="40" height="40" rx="8" fill="#2d2d2d" stroke="#2dcfff" stroke-width="2"/>
          <text x="24" y="32" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#2dcfff">N</text>
        </svg>
        <span class="title">KeyNav</span>
      </div>
      <div class="status" id="status"></div>
    </div>

    <!-- Activation Key -->
    <div class="section">
      <label class="label">Activation Key</label>
      <div class="key-row">
        <div class="key-display" id="activationKeyDisplay">/</div>
        <button id="changeKeyBtn" class="btn-change">Change</button>
      </div>
      <div class="hint">Hold <kbd>Ctrl</kbd> + hint = new tab</div>
    </div>

    <!-- Hint Characters -->
    <div class="section">
      <label class="label">Hint Characters</label>
      <input type="text" id="hintChars" class="input" placeholder="asdfghjkl">
    </div>

    <!-- Colors -->
    <div class="section">
      <label class="label">Colors</label>
      <div class="color-inputs">
        <div class="color-input-row">
          <div class="color-swatch clickable" id="bgSwatch" data-target="backgroundColor" title="Click to pick"></div>
          <input type="text" id="backgroundColor" class="hex-input" placeholder="#ffeb3b" maxlength="7">
          <span class="color-label">Fill</span>
        </div>
        <div class="color-input-row">
          <div class="color-swatch clickable" id="textSwatch" data-target="textColor" title="Click to pick"></div>
          <input type="text" id="textColor" class="hex-input" placeholder="#000000" maxlength="7">
          <span class="color-label">Text</span>
        </div>
        <div class="color-input-row">
          <div class="color-swatch clickable" id="borderSwatch" data-target="borderColor" title="Click to pick"></div>
          <input type="text" id="borderColor" class="hex-input" placeholder="#f9a825" maxlength="7">
          <span class="color-label">Border</span>
        </div>
      </div>
      
      <!-- Inline Color Picker -->
      <div class="color-picker-popup" id="colorPickerPopup">
        <div class="picker-palette" id="pickerPalette"></div>
        <div class="picker-shades" id="pickerShades"></div>
      </div>
      
      <div class="presets-label">Theme Presets:</div>
      <div class="presets">
        <button class="preset" data-preset="cyan" style="background:#666666; border-color:#2dcfff" title="Cyan"></button>
        <button class="preset" data-preset="yellow" style="background:#ffeb3b" title="Yellow"></button>
        <button class="preset" data-preset="blue" style="background:#2196f3" title="Blue"></button>
        <button class="preset" data-preset="green" style="background:#4caf50" title="Green"></button>
        <button class="preset" data-preset="orange" style="background:#ff9800" title="Orange"></button>
        <button class="preset" data-preset="dark" style="background:#424242" title="Dark"></button>
      </div>
    </div>

    <!-- Size & Style -->
    <div class="section">
      <label class="label">Style</label>
      <div class="style-grid">
        <div class="style-item">
          <span>Size</span>
          <input type="range" id="fontSize" min="6" max="20" value="12">
          <span class="range-value" id="fontSizeVal">12</span>
        </div>
        <div class="style-item">
          <span>Padding</span>
          <input type="range" id="padding" min="0" max="8" value="2">
          <span class="range-value" id="paddingVal">2</span>
        </div>
        <div class="style-item">
          <span>Roundness</span>
          <input type="range" id="borderRadius" min="0" max="12" value="3">
          <span class="range-value" id="borderRadiusVal">3</span>
        </div>
        <div class="style-item">
          <span>Opacity</span>
          <input type="range" id="opacity" min="50" max="100" value="95">
          <span class="range-value" id="opacityVal">95%</span>
        </div>
      </div>
      <div class="checkboxes">
        <label class="checkbox">
          <input type="checkbox" id="uppercase" checked>
          <span>UPPERCASE hints</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="showInputIndicator" checked>
          <span>Show typing indicator</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="persistentMode">
          <span>Persistent mode (stay active after click)</span>
        </label>
      </div>
    </div>

    <!-- Preview -->
    <div class="section preview-section">
      <span class="preview-label">Preview:</span>
      <div class="preview-hint" id="preview">AS</div>
    </div>

    <!-- Actions -->
    <div class="footer">
      <button id="resetBtn" class="btn-reset">Reset</button>
      <button id="saveBtn" class="btn-save">Save</button>
    </div>

    <!-- Import/Export -->
    <div class="transfer-section">
      <button id="exportBtn" class="btn-transfer">Export Settings</button>
      <button id="importBtn" class="btn-transfer">Import Settings</button>
      <input type="file" id="importFile" accept=".json" hidden>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
